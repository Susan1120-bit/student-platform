<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Student Submission Platform{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #f8fafc; color: #1e293b; min-height: 100vh; }

    /* Nav */
    nav { background: #0f172a; color: white; padding: 0 1.5rem;
          display: flex; align-items: center; height: 56px; gap: 1rem; }
    .brand { font-weight: 700; font-size: 1.05rem; color: #60a5fa; text-decoration: none; letter-spacing: -0.3px; }
    .nav-link { color: #94a3b8; text-decoration: none; font-size: 0.875rem; transition: color 0.15s; }
    .nav-link:hover { color: white; }
    .spacer { flex: 1; }

    /* Layout */
    .container { max-width: 880px; margin: 0 auto; padding: 2rem 1rem; }

    /* Cards */
    .card { background: white; border-radius: 12px; border: 1px solid #e2e8f0;
            padding: 1.5rem; margin-bottom: 1.25rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05); }

    /* Question card */
    .q-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0;
               margin-bottom: 1.5rem; overflow: hidden;
               box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .q-head { background: #0f172a; padding: 0.9rem 1.4rem;
               display: flex; align-items: center; gap: 0.75rem; }
    .q-num { background: #3b82f6; color: white; font-weight: 700; font-size: 0.78rem;
              padding: 0.2rem 0.55rem; border-radius: 6px; white-space: nowrap; }
    .q-title { color: white; font-weight: 600; font-size: 0.98rem; }
    .q-body { padding: 1.4rem; }
    .q-desc { color: #475569; line-height: 1.75; white-space: pre-wrap;
               font-size: 0.93rem; margin-bottom: 1.2rem; }

    /* Forms */
    label { display: block; font-weight: 600; font-size: 0.85rem;
            color: #374151; margin-bottom: 0.4rem; }
    input[type="email"], input[type="text"], input[type="password"],
    input[type="number"], textarea {
      width: 100%; border: 1.5px solid #cbd5e1; border-radius: 8px;
      padding: 0.65rem 0.85rem; font-size: 0.93rem; font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #f8fafc; color: #1e293b; }
    input:focus, textarea:focus {
      outline: none; border-color: #3b82f6; background: white;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
    textarea { min-height: 140px; resize: vertical; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem;
           padding: 0.6rem 1.2rem; border-radius: 8px; border: none;
           font-size: 0.88rem; font-weight: 600; cursor: pointer;
           text-decoration: none; transition: all 0.15s; }
    .btn-primary  { background: #2563eb; color: white; }
    .btn-primary:hover  { background: #1d4ed8; }
    .btn-danger   { background: #ef4444; color: white; }
    .btn-danger:hover   { background: #dc2626; }
    .btn-outline  { background: transparent; color: #64748b; border: 1.5px solid #cbd5e1; }
    .btn-outline:hover  { border-color: #94a3b8; color: #0f172a; }
    .btn-success  { background: #16a34a; color: white; }
    .btn-success:hover  { background: #15803d; }
    .btn-sm { padding: 0.35rem 0.72rem; font-size: 0.8rem; }

    .btn-row { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }

    /* Alerts */
    .alert { padding: 0.8rem 1rem; border-radius: 8px; margin-bottom: 1.1rem; font-size: 0.88rem; }
    .alert-error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    /* Table */
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 0.55rem 1rem; font-size: 0.75rem;
         color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
         border-bottom: 2px solid #e2e8f0; }
    td { padding: 0.75rem 1rem; border-bottom: 1px solid #f1f5f9;
         font-size: 0.88rem; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
              gap: 1rem; margin-bottom: 1.25rem; }
    .stat { background: white; border: 1px solid #e2e8f0; border-radius: 10px;
             padding: 1.2rem; text-align: center; }
    .stat-val   { font-size: 2rem; font-weight: 700; color: #2563eb; line-height: 1; }
    .stat-label { font-size: 0.78rem; color: #64748b; margin-top: 0.3rem; }

    /* Misc */
    .empty { text-align: center; padding: 2.5rem; color: #94a3b8; }
    .page-header { margin-bottom: 1.75rem; }
    .page-header h1 { font-size: 1.45rem; font-weight: 700; color: #0f172a; }
    .page-header p  { color: #64748b; margin-top: 0.2rem; font-size: 0.88rem; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
              font-size: 0.74rem; font-weight: 600; }
    .badge-blue  { background: #dbeafe; color: #1d4ed8; }

    .login-wrap { max-width: 380px; margin: 4rem auto; padding: 0 1rem; }

    .success-icon { width: 64px; height: 64px; background: #d1fae5; border-radius: 50%;
                     display: flex; align-items: center; justify-content: center;
                     margin: 0 auto 1rem; font-size: 2rem; }

    /* Code question badge on question header */
    .q-badge { background: #7c3aed; color: white; font-size: 0.72rem; font-weight: 700;
                padding: 0.15rem 0.5rem; border-radius: 5px; margin-left: auto; }

    /* Monospace textarea for code */
    textarea.code-area { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace;
                          font-size: 0.875rem; background: #0f172a; color: #e2e8f0;
                          border-color: #334155; min-height: 180px; }
    textarea.code-area:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); background: #0f172a; }

    /* Execution output blocks */
    pre.code-block { background: #0f172a; color: #e2e8f0; font-family: 'Consolas', monospace;
                      font-size: 0.82rem; padding: 1rem; border-radius: 8px; overflow-x: auto;
                      white-space: pre-wrap; word-break: break-all; margin: 0; }
    pre.output-block { font-family: 'Consolas', monospace; font-size: 0.82rem; padding: 0.9rem 1rem;
                        border-radius: 8px; overflow-x: auto; white-space: pre-wrap;
                        word-break: break-all; margin: 0; }
    pre.output-block.ok  { background: #f0fdf4; color: #14532d; border: 1px solid #bbf7d0; }
    pre.output-block.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    /* Claude feedback box */
    .feedback-box { background: #faf5ff; border: 1px solid #e9d5ff; border-radius: 8px;
                     padding: 1rem 1.1rem; font-size: 0.9rem; line-height: 1.7; color: #3b0764; }

    .result-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
                     letter-spacing: 0.06em; color: #64748b; margin-bottom: 0.4rem; }

    /* Safety status bars */
    .status-bar { padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.875rem;
                   font-weight: 600; margin-bottom: 1.1rem; line-height: 1.5; }
    .status-bar.safe   { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .status-bar.unsafe { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    /* Test pass rate bar */
    .test-bar-wrap { background: #e2e8f0; border-radius: 999px; height: 10px; overflow: hidden; margin-top: 0.5rem; }
    .test-bar-fill { height: 100%; border-radius: 999px; transition: width 0.4s; }

    /* Failure examples */
    .failure-row { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
                    padding: 0.7rem 0.9rem; margin-bottom: 0.5rem; font-size: 0.85rem; line-height: 1.7; }
    .fail-label { font-weight: 700; color: #64748b; font-size: 0.78rem; }

    @media (max-width: 600px) {
      .container { padding: 1rem 0.75rem; }
      .btn-row { flex-direction: column; align-items: stretch; }
      .btn-row .btn { justify-content: center; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="/">&#128218; Student Platform</a>
    <span class="spacer"></span>
    {% if session.get('admin') %}
      <a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
      <a class="nav-link" href="{{ url_for('admin_logout') }}">Logout</a>
    {% else %}
      <a class="nav-link" href="{{ url_for('admin_login') }}">Admin</a>
    {% endif %}
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
