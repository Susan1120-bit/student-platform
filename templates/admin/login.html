{% extends 'base.html' %}
{% block title %}Admin Login{% endblock %}
{% block content %}

<div class="login-wrap">
  <div class="card">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <div style="font-size:2.2rem; margin-bottom:0.5rem;">&#128274;</div>
      <h2 style="font-size:1.15rem; font-weight:700;">Admin Login</h2>
      <p style="color:#64748b; font-size:0.85rem; margin-top:0.3rem;">Student Submission Platform</p>
    </div>
    <form method="POST">
      <div style="margin-bottom:1.25rem;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autofocus required
               placeholder="Enter admin password">
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%; justify-content:center;">Login</button>
    </form>
  </div>
</div>

{% endblock %}
